<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Will you go out on a date with me? ❤️</title>
  <style>
    /* ── Reset & base ─────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --pink: #ff8fab;
      --pink-light: #ffc2d1;
      --pink-pale: #ffe5ec;
      --lavender: #cdb4db;
      --cream: #fff0f3;
      --text: #5c3d4e;
      --shadow: rgba(255, 143, 171, 0.35);
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: "Segoe UI", "Trebuchet MS", system-ui, sans-serif;
      background: linear-gradient(135deg, var(--cream) 0%, var(--pink-pale) 40%, var(--lavender) 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      position: relative;
    }

    /* Floating background hearts */
    .bg-hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .bg-hearts span {
      position: absolute;
      font-size: 1.5rem;
      opacity: 0.15;
      animation: float 8s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50%       { transform: translateY(-20px) rotate(10deg); }
    }

    /* ── Page container ───────────────────────────────────────── */
    .page {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      text-align: center;
      opacity: 0;
      visibility: hidden;
      transform: translateY(30px);
      transition: opacity 0.6s ease, transform 0.6s ease, visibility 0.6s;
      z-index: 1;
    }

    .page.active {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .page.exit {
      opacity: 0;
      transform: translateY(-30px);
    }

    /* ── Typography ───────────────────────────────────────────── */
    h1 {
      font-size: clamp(1.8rem, 6vw, 3rem);
      font-weight: 700;
      color: var(--text);
      margin-bottom: 2.5rem;
      line-height: 1.3;
      text-shadow: 0 2px 12px var(--shadow);
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.03); }
    }

    /* ── Button area ──────────────────────────────────────────── */
    .buttons {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      gap: clamp(0.65rem, 2vw, 1rem);
      justify-content: center;
      align-items: center;
      width: 100%;
      max-width: 720px;
      position: relative;
    }

    /* Wrapper for dodge buttons — stays in flow until desktop hover */
    .btn-wrapper {
      position: relative;
      flex-shrink: 0;
    }

    .btn-wrapper.dodging {
      position: fixed;
      z-index: 10;
      transition: left 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
                  top 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .btn-wrapper.dodging button {
      width: auto;
    }

    button {
      font-family: inherit;
      font-size: clamp(1rem, 3.5vw, 1.15rem);
      font-weight: 600;
      padding: 0.85rem 1.8rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      white-space: nowrap;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-wide {
      white-space: normal;
      max-width: 320px;
      line-height: 1.35;
    }

    /* Yes / final-choice buttons */
    .btn-yes {
      background: linear-gradient(135deg, var(--pink) 0%, #ff6b9d 100%);
      color: #fff;
      box-shadow: 0 6px 20px var(--shadow);
    }

    .btn-yes:hover {
      transform: scale(1.08);
      box-shadow: 0 8px 28px rgba(255, 107, 157, 0.5);
    }

    .btn-yes:active {
      transform: scale(0.97);
    }

    /* Dodge buttons — fixed on screen so they can roam freely */
    .btn-dodge {
      background: #fff;
      color: var(--text);
      border: 2px solid var(--pink-light);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
      touch-action: none;
    }

    .btn-dodge:hover {
      border-color: var(--pink);
    }

    /* ── Celebration screen ───────────────────────────────────── */
    .celebration-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      max-width: 480px;
      animation: fadeInUp 0.8s ease forwards;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .celebration-title {
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      font-weight: 800;
      color: var(--text);
      text-shadow: 0 2px 16px var(--shadow);
      line-height: 1.3;
      margin-bottom: 0.25rem;
    }

    .celebration-line {
      font-size: clamp(1rem, 3.2vw, 1.15rem);
      line-height: 1.5;
      opacity: 0.9;
    }

    .celebration-detail {
      font-size: clamp(1.05rem, 3.5vw, 1.25rem);
      font-weight: 600;
      margin-top: 0.25rem;
      padding: 0.5rem 1.2rem;
      background: rgba(255, 255, 255, 0.55);
      border-radius: 30px;
      backdrop-filter: blur(4px);
    }

    .celebration-content .btn-yes {
      margin-top: 1.25rem;
    }

    /* ── Final screen ─────────────────────────────────────────── */
    .final-emoji {
      font-size: clamp(3rem, 12vw, 5rem);
      margin-bottom: 1rem;
      animation: bounce 1s ease infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }

    .final-msg {
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 700;
      color: var(--text);
      text-shadow: 0 2px 12px var(--shadow);
      line-height: 1.4;
    }

    /* ── Confetti / hearts canvas overlay ─────────────────────── */
    #celebration {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
    }

    /* ── Mobile tweaks ────────────────────────────────────────── */
    @media (max-width: 640px) {
      h1 {
        margin-bottom: 2rem;
      }

      .buttons {
        flex-wrap: wrap;
        gap: 0.75rem;
      }

      button {
        font-size: 0.95rem;
        padding: 0.75rem 1.25rem;
      }

      .btn-wide {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>

  <!-- Decorative background hearts -->
  <div class="bg-hearts" aria-hidden="true" id="bgHearts"></div>

  <!-- Celebration canvas -->
  <canvas id="celebration"></canvas>

  <!-- ── Page 1 ─────────────────────────────────────────────── -->
  <section class="page active" id="page1">
    <h1>Will you go out on a date with me? ❤️</h1>
    <div class="buttons" id="buttons1">
      <button class="btn-yes" id="btnYes">Yes 💖</button>
      <div class="btn-wrapper" id="wrapNo">
        <button type="button" class="btn-dodge" id="btnNo">No 🙈</button>
      </div>
      <div class="btn-wrapper" id="wrapMaybe">
        <button type="button" class="btn-dodge" id="btnMaybe">Maybe 🤔</button>
      </div>
    </div>
  </section>

  <!-- ── Page 2 ─────────────────────────────────────────────── -->
  <section class="page" id="page2">
    <h1>How excited are you? 💕</h1>
    <div class="buttons" id="buttons2">
      <div class="btn-wrapper" id="wrapSomewhat">
        <button type="button" class="btn-dodge" id="btnSomewhat">Somewhat 🙂</button>
      </div>
      <div class="btn-wrapper" id="wrapExcited">
        <button type="button" class="btn-dodge" id="btnExcited">Really Excited 🤩</button>
      </div>
      <button class="btn-yes btn-wide" id="btnFinal">Dying to meet you, Madhan! 💖</button>
    </div>
  </section>

  <!-- ── Page 3 (Celebration) ───────────────────────────────── -->
  <section class="page" id="page3">
    <div class="celebration-content">
      <p class="celebration-title">Yay! IT'S OUR FIRST DATE!</p>
      <p class="celebration-line">I knew you'd say yes! ❤️</p>
      <p class="celebration-line">Now I officially can't wait to see you. 💕</p>
      <p class="celebration-detail">🌹 Date: 15th July</p>
      <p class="celebration-detail">✨ Location: Let's decide!</p>
      <button class="btn-yes" id="btnCountMeIn">Count me in! 💝</button>
    </div>
  </section>

  <!-- ── Page 4 (Final) ─────────────────────────────────────── -->
  <section class="page" id="page4">
    <div class="final-emoji">🥰</div>
    <p class="final-msg">See you soon, Doctor ❤️✨</p>
  </section>

  <script>
    /* ───────────────────────────────────────────────────────────
       DODGE BUTTON LOGIC
       Desktop: dodge on hover. Mobile: dodge on touch + periodic
       wander. All dodges use collision detection to avoid overlap,
       stay below the question, and remain on-screen.
    ─────────────────────────────────────────────────────────── */

    const isDesktopDodge = window.matchMedia('(hover: hover) and (pointer: fine)').matches;

    const dodgeRegistry = [];
    let mobileWanderTimer = null;
    const BUTTON_GAP = 16;
    const VIEWPORT_MARGIN = 16;

    function getPageElement(pageId) {
      return document.getElementById(pageId);
    }

    /** Safe zone: below the question, above the bottom edge */
    function getSafeZone(pageId) {
      const page = getPageElement(pageId);
      const h1 = page.querySelector('h1');
      const questionBottom = h1.getBoundingClientRect().bottom + 32;

      return {
        top: questionBottom,
        bottom: window.innerHeight - VIEWPORT_MARGIN,
        left: VIEWPORT_MARGIN,
        right: window.innerWidth - VIEWPORT_MARGIN,
      };
    }

    function clampToZone(x, y, el, zone) {
      const w = el.offsetWidth;
      const h = el.offsetHeight;
      return {
        x: Math.max(zone.left, Math.min(x, zone.right - w)),
        y: Math.max(zone.top,  Math.min(y, zone.bottom - h)),
      };
    }

    function rectsOverlap(a, b, gap) {
      return !(
        a.right + gap < b.left ||
        a.left > b.right + gap ||
        a.bottom + gap < b.top ||
        a.top > b.bottom + gap
      );
    }

    /** Collect rects of other buttons that must not be covered */
    function getObstacleRects(pageId, selfWrapper) {
      const page = getPageElement(pageId);
      const obstacles = [];

      dodgeRegistry
        .filter((d) => d.pageId === pageId && d.wrapper.classList.contains('dodging') && d.wrapper !== selfWrapper)
        .forEach((d) => obstacles.push(d.wrapper.getBoundingClientRect()));

      page.querySelectorAll('.btn-yes').forEach((btn) => {
        obstacles.push(btn.getBoundingClientRect());
      });

      return obstacles;
    }

    /** Find a random position in the safe zone that avoids all obstacles */
    function findClearPosition(wrapper, button, pageId) {
      const zone = getSafeZone(pageId);
      const w = button.offsetWidth;
      const h = button.offsetHeight;
      const obstacles = getObstacleRects(pageId, wrapper);

      const maxX = zone.right - w;
      const maxY = zone.bottom - h;
      if (maxX < zone.left || maxY < zone.top) {
        return clampToZone(zone.left, zone.top, button, zone);
      }

      for (let i = 0; i < 60; i++) {
        const x = zone.left + Math.random() * (maxX - zone.left);
        const y = zone.top  + Math.random() * (maxY - zone.top);
        const candidate = { left: x, top: y, right: x + w, bottom: y + h };

        if (!obstacles.some((obs) => rectsOverlap(candidate, obs, BUTTON_GAP))) {
          return { x, y };
        }
      }

      // Fallback: stack below the question, offset horizontally
      const index = dodgeRegistry.filter((d) => d.pageId === pageId && d.wrapper.classList.contains('dodging')).length;
      return clampToZone(
        zone.left + index * (w + BUTTON_GAP),
        zone.top,
        button,
        zone
      );
    }

    function makeDodgeButton(wrapper, button, pageId) {
      let lastDodge = 0;

      function blockAction(e) {
        e.preventDefault();
        e.stopPropagation();
        return false;
      }

      function pinFixed() {
        if (wrapper.classList.contains('dodging')) return;
        const rect = button.getBoundingClientRect();
        wrapper.classList.add('dodging');
        wrapper.style.left = rect.left + 'px';
        wrapper.style.top  = rect.top  + 'px';
      }

      function dodge(immediate) {
        const now = Date.now();
        if (now - lastDodge < 80) return;
        lastDodge = now;

        pinFixed();
        const pos = findClearPosition(wrapper, button, pageId);

        if (immediate) {
          wrapper.style.transition = 'none';
          wrapper.style.left = pos.x + 'px';
          wrapper.style.top  = pos.y + 'px';
          void wrapper.offsetWidth;
          wrapper.style.transition = '';
        } else {
          wrapper.style.left = pos.x + 'px';
          wrapper.style.top  = pos.y + 'px';
        }
      }

      // Desktop — dodge on hover
      if (isDesktopDodge) {
        button.addEventListener('mouseenter', () => dodge(false));
      }

      // Mobile — dodge instantly before tap registers
      button.addEventListener('touchstart', (e) => {
        dodge(true);
        e.preventDefault();
        e.stopPropagation();
      }, { passive: false });

      // Block activation — never advance the flow
      ['click', 'touchend', 'touchcancel', 'mousedown', 'mouseup', 'pointerup'].forEach((evt) => {
        button.addEventListener(evt, blockAction, true);
      });

      button.addEventListener('contextmenu', blockAction);

      const entry = { wrapper, button, pageId, reset, dodge };
      dodgeRegistry.push(entry);
      return entry;

      function reset() {
        wrapper.classList.remove('dodging');
        wrapper.style.left = '';
        wrapper.style.top  = '';
      }
    }

    function resetPageDodgeButtons(pageId) {
      dodgeRegistry
        .filter((d) => d.pageId === pageId)
        .forEach((d) => d.reset());
    }

    makeDodgeButton(document.getElementById('wrapNo'),       document.getElementById('btnNo'),       'page1');
    makeDodgeButton(document.getElementById('wrapMaybe'),     document.getElementById('btnMaybe'),     'page1');
    makeDodgeButton(document.getElementById('wrapSomewhat'), document.getElementById('btnSomewhat'), 'page2');
    makeDodgeButton(document.getElementById('wrapExcited'),  document.getElementById('btnExcited'),  'page2');

    /** Mobile — nudge visible runaway buttons every 1.5–2 s */
    function scheduleMobileWander() {
      if (isDesktopDodge) return;
      if (mobileWanderTimer) clearTimeout(mobileWanderTimer);

      const delay = 1500 + Math.random() * 500;
      mobileWanderTimer = setTimeout(() => {
        const activePage = document.querySelector('.page.active');
        if (activePage) {
          dodgeRegistry
            .filter((d) => activePage.contains(d.wrapper))
            .forEach((d) => d.dodge(false));
        }
        scheduleMobileWander();
      }, delay);
    }

    scheduleMobileWander();

    window.addEventListener('resize', () => {
      dodgeRegistry.forEach((d) => {
        if (!d.wrapper.classList.contains('dodging')) return;
        const x = parseFloat(d.wrapper.style.left) || 0;
        const y = parseFloat(d.wrapper.style.top)  || 0;
        const zone = getSafeZone(d.pageId);
        const pos = clampToZone(x, y, d.button, zone);
        d.wrapper.style.left = pos.x + 'px';
        d.wrapper.style.top  = pos.y + 'px';
      });
    });

    /* ───────────────────────────────────────────────────────────
       PAGE TRANSITIONS
    ─────────────────────────────────────────────────────────── */

    function goToPage(fromId, toId) {
      const from = document.getElementById(fromId);
      const to   = document.getElementById(toId);

      from.classList.add('exit');
      from.classList.remove('active');

      setTimeout(() => {
        from.classList.remove('exit');
        to.classList.add('active');
        resetPageDodgeButtons(fromId);
      }, 600);
    }

    /* Only these two buttons may advance screens 1 → 2 */
    document.getElementById('btnYes').addEventListener('click', (e) => {
      e.stopPropagation();
      goToPage('page1', 'page2');
    });

    document.getElementById('btnFinal').addEventListener('click', (e) => {
      e.stopPropagation();
      goToPage('page2', 'page3');
      startCelebration();
    });

    document.getElementById('btnCountMeIn').addEventListener('click', (e) => {
      goToPage('page3', 'page4');
      burstCelebration();
    });

    /* ───────────────────────────────────────────────────────────
       BACKGROUND HEARTS
    ─────────────────────────────────────────────────────────── */

    (function createBgHearts() {
      const container = document.getElementById('bgHearts');
      const emojis = ['❤️', '💖', '💕', '💗', '💓', '💞', '💘', '💝', '🥰', '✨', '🌹', '🌷', '🎀', '🦋', '🌟'];
      for (let i = 0; i < 20; i++) {
        const span = document.createElement('span');
        span.textContent = emojis[i % emojis.length];
        span.style.left = Math.random() * 100 + '%';
        span.style.top  = Math.random() * 100 + '%';
        span.style.animationDelay = (Math.random() * 6) + 's';
        span.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
        container.appendChild(span);
      }
    })();

    /* ───────────────────────────────────────────────────────────
       CELEBRATION — hearts, sparkles & confetti
    ─────────────────────────────────────────────────────────── */

    const particles = [];
    let animating = false;
    let rainInterval = null;

    function drawHeart(ctx, x, y, size, color, alpha) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = color;
      ctx.beginPath();
      const s = size / 2;
      ctx.moveTo(x, y + s * 0.3);
      ctx.bezierCurveTo(x, y, x - s, y, x - s, y + s * 0.3);
      ctx.bezierCurveTo(x - s, y + s * 0.7, x, y + s, x, y + s * 1.3);
      ctx.bezierCurveTo(x, y + s, x + s, y + s * 0.7, x + s, y + s * 0.3);
      ctx.bezierCurveTo(x + s, y, x, y, x, y + s * 0.3);
      ctx.fill();
      ctx.restore();
    }

    /** Four-pointed sparkle star */
    function drawSparkle(ctx, x, y, size, color, alpha, rotation) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = color;
      ctx.translate(x, y);
      ctx.rotate(rotation);
      ctx.beginPath();
      const s = size / 2;
      ctx.moveTo(0, -s);
      ctx.lineTo(s * 0.25, -s * 0.25);
      ctx.lineTo(s, 0);
      ctx.lineTo(s * 0.25, s * 0.25);
      ctx.lineTo(0, s);
      ctx.lineTo(-s * 0.25, s * 0.25);
      ctx.lineTo(-s, 0);
      ctx.lineTo(-s * 0.25, -s * 0.25);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function spawnBurst(count, originX, originY, spread) {
      const colors = ['#ff8fab', '#ffc2d1', '#cdb4db', '#ff6b9d', '#ffe5ec', '#e8a0bf', '#ffd700', '#fff'];
      const shapes = ['heart', 'heart', 'sparkle', 'circle', 'confetti'];

      for (let i = 0; i < count; i++) {
        const shape = shapes[Math.floor(Math.random() * shapes.length)];
        particles.push({
          x: originX + (Math.random() - 0.5) * spread,
          y: originY,
          vx: (Math.random() - 0.5) * 8,
          vy: -(Math.random() * 6 + 2),
          size: Math.random() * 10 + 5,
          color: colors[Math.floor(Math.random() * colors.length)],
          shape,
          rotation: Math.random() * Math.PI * 2,
          rotationSpeed: (Math.random() - 0.5) * 0.2,
          gravity: 0.05 + Math.random() * 0.04,
          opacity: 1,
          decay: 0.003 + Math.random() * 0.004,
          width: Math.random() * 6 + 4,
          height: Math.random() * 10 + 6,
        });
      }
    }

    function animateCelebration() {
      const canvas = document.getElementById('celebration');
      const ctx = canvas.getContext('2d');

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      let alive = false;

      for (const p of particles) {
        if (p.opacity <= 0) continue;
        alive = true;

        p.vy += p.gravity;
        p.x  += p.vx;
        p.y  += p.vy;
        p.rotation += p.rotationSpeed;
        p.opacity  -= p.decay;

        if (p.shape === 'heart') {
          drawHeart(ctx, p.x, p.y, p.size, p.color, p.opacity);
        } else if (p.shape === 'sparkle') {
          drawSparkle(ctx, p.x, p.y, p.size, p.color, p.opacity, p.rotation);
        } else if (p.shape === 'confetti') {
          ctx.save();
          ctx.globalAlpha = p.opacity;
          ctx.fillStyle = p.color;
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rotation);
          ctx.fillRect(-p.width / 2, -p.height / 2, p.width, p.height);
          ctx.restore();
        } else {
          ctx.save();
          ctx.globalAlpha = p.opacity;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size / 2, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }

      if (alive) {
        requestAnimationFrame(animateCelebration);
      } else {
        animating = false;
      }
    }

    function ensureAnimation() {
      if (!animating) {
        animating = true;
        animateCelebration();
      }
    }

    function startHeartRain() {
      if (rainInterval) return;

      const canvas = document.getElementById('celebration');
      const colors = ['#ff8fab', '#ffc2d1', '#cdb4db', '#ff6b9d', '#ffe5ec', '#ffd700'];
      const shapes = ['heart', 'heart', 'sparkle', 'circle'];

      rainInterval = setInterval(() => {
        for (let i = 0; i < 4; i++) {
          const shape = shapes[Math.floor(Math.random() * shapes.length)];
          particles.push({
            x: Math.random() * canvas.width,
            y: -10,
            vx: (Math.random() - 0.5) * 2,
            vy: Math.random() * 2 + 1,
            size: Math.random() * 8 + 5,
            color: colors[Math.floor(Math.random() * colors.length)],
            shape,
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 0.1,
            gravity: 0.03,
            opacity: 0.85,
            decay: 0.002,
            width: 5,
            height: 8,
          });
        }
        ensureAnimation();
      }, 350);
    }

    function startCelebration() {
      const canvas = document.getElementById('celebration');
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;

      spawnBurst(140, canvas.width / 2, canvas.height / 2, 240);
      ensureAnimation();
      startHeartRain();
    }

    function burstCelebration() {
      const canvas = document.getElementById('celebration');
      spawnBurst(80, canvas.width / 2, canvas.height / 2, 180);
      ensureAnimation();
    }

    window.addEventListener('resize', () => {
      const canvas = document.getElementById('celebration');
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
